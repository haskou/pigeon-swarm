name: Publish Docker image

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - source-published
  workflow_dispatch:
    inputs:
      node_ref:
        description: Branch, tag, or commit for the backend repository.
        required: false
      ui_ref:
        description: Branch, tag, or commit for the frontend repository.
        required: false

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out image project
        uses: actions/checkout@v4

      - name: Resolve image and source inputs
        shell: bash
        env:
          NODE_REPOSITORY_VAR: ${{ vars.PIGEON_SWARM_NODE_REPOSITORY }}
          NODE_REF_VAR: ${{ vars.PIGEON_SWARM_NODE_REF }}
          NODE_REF_INPUT: ${{ inputs.node_ref }}
          NODE_REF_PAYLOAD: ${{ github.event.client_payload.node_ref }}
          UI_REPOSITORY_VAR: ${{ vars.PIGEON_SWARM_UI_REPOSITORY }}
          UI_REF_VAR: ${{ vars.PIGEON_SWARM_UI_REF }}
          UI_REF_INPUT: ${{ inputs.ui_ref }}
          UI_REF_PAYLOAD: ${{ github.event.client_payload.ui_ref }}
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          node_repository="${NODE_REPOSITORY_VAR:-https://github.com/haskou/pigeon-swarm-node.git}"
          node_ref="${NODE_REF_INPUT:-${NODE_REF_PAYLOAD:-${NODE_REF_VAR:-main}}}"
          ui_repository="${UI_REPOSITORY_VAR:-https://github.com/haskou/pigeon-swarm-ui.git}"
          ui_ref="${UI_REF_INPUT:-${UI_REF_PAYLOAD:-${UI_REF_VAR:-main}}}"

          {
            echo "IMAGE_NAME=${image_name}"
            echo "PIGEON_SWARM_NODE_REPOSITORY=${node_repository}"
            echo "PIGEON_SWARM_NODE_REF=${node_ref}"
            echo "PIGEON_SWARM_UI_REPOSITORY=${ui_repository}"
            echo "PIGEON_SWARM_UI_REF=${ui_ref}"
          } >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PIGEON_SWARM_NODE_REPOSITORY=${{ env.PIGEON_SWARM_NODE_REPOSITORY }}
            PIGEON_SWARM_NODE_REF=${{ env.PIGEON_SWARM_NODE_REF }}
            PIGEON_SWARM_UI_REPOSITORY=${{ env.PIGEON_SWARM_UI_REPOSITORY }}
            PIGEON_SWARM_UI_REF=${{ env.PIGEON_SWARM_UI_REF }}
            VITE_API_SERVER_URL=/api
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          secrets: |
            github_token=${{ secrets.SOURCE_REPOSITORIES_TOKEN }}
