services:
  app:
    image: ghcr.io/haskou/pigeon-swarm:latest
    pull_policy: always
    init: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - KILL
      - SETGID
      - SETUID
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LINK_PREVIEW_RATE_LIMIT_PER_MINUTE: ${LINK_PREVIEW_RATE_LIMIT_PER_MINUTE:-30}
      PUSH_VAPID_PUBLIC_KEY: ${PUSH_VAPID_PUBLIC_KEY:-}
      PUSH_VAPID_PRIVATE_KEY: ${PUSH_VAPID_PRIVATE_KEY:-}
      PUSH_VAPID_SUBJECT: ${PUSH_VAPID_SUBJECT:-}
      PIGEON_PRIVATE_RELAY_PORT_START: ${PIGEON_PRIVATE_RELAY_PORT_START:-}
      PIGEON_PRIVATE_RELAY_PORT_END: ${PIGEON_PRIVATE_RELAY_PORT_END:-}
      PIGEON_RELAY_DATA_LIMIT_BYTES: ${PIGEON_RELAY_DATA_LIMIT_BYTES:-67108864}
      PIGEON_PUBLIC_HOST: ${PIGEON_PUBLIC_HOST:-}
    volumes:
      - ${IPFS_STORAGE_HOST_PATH:-./ipfs_storage}:/data/ipfs
      - ${LOCAL_STORAGE_HOST_PATH:-./local_storage}:/data/local_storage
    ports:
      - "${PORT:-8080}:8080"
      # Private relay nodes must also publish the configured relay range, for example:
      # - "${PIGEON_PRIVATE_RELAY_PORT_START:-4100}-${PIGEON_PRIVATE_RELAY_PORT_END:-4199}:${PIGEON_PRIVATE_RELAY_PORT_START:-4100}-${PIGEON_PRIVATE_RELAY_PORT_END:-4199}"
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
